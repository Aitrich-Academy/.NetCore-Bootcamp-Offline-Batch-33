<div class="content">

    <div class="content-top d-flex align-items-center p-4">

        <div class="content-top-left d-flex flex-column align-items-center justify-content-center me-5">

            <p class="fw-bold p-0 m-0">Showing {{registrations.length}} Applicants</p>
            <p class="text-muted p-0 m-0">Based Your Preferences</p>

        </div>

        <ul class="d-flex list-unstyled align-items-center m-0">

            <li class="me-2">
                <button class="btn rounded-pill" 
                [ngClass]="selectedFilter === 'All' ? 'active-btn' : 'inactive-btn'"
                (click)="filterRegistrations('All')">
                    All
                </button>
            </li>

            <li class="me-2">
                <button class="btn rounded-pill" 
                [ngClass]="selectedFilter === 'Pending' ? 'active-btn' : 'inactive-btn'"
                (click)="filterRegistrations('Pending')">
                    Pending
                </button>
            </li>

            <li class="me-2">
                <button class="btn rounded-pill" 
                [ngClass]="selectedFilter === 'On Hold' ? 'active-btn' : 'inactive-btn'"
                (click)="filterRegistrations('On Hold')">
                    On Hold
                </button>
            </li>

            <li>
                <button class="btn rounded-pill" 
                [ngClass]="selectedFilter === 'Candidate' ? 'active-btn' : 'inactive-btn'"
                (click)="filterRegistrations('Candidate')">
                    Candidate
                </button>
            </li>

        </ul>

    </div>

    <div class="content-bottom p-4">

        <table class="table bg-white">

            <thead class="table-head">
                <tr>
                    <td>ID</td>
                    <td>Date Applied</td>
                    <td>Company</td>
                    <td>Type</td>
                    <td>Position</td>
                    <td>Contact</td>
                    <td>Status</td>
                    <td></td>
                </tr>
            </thead>

            <tbody>

                <tr *ngFor="let r of registrations">

                    <td>{{r.id}}</td>
                    <td>{{r.dateApplied}}</td>
                    <td class="d-flex">
                        <img [src]="r.image" class="company-icon">
                        <div class="d-flex flex-column justify-content-center">
                            <span>{{r.company}}</span>
                            <span>{{r.department}}</span>
                        </div>
                    </td>
                    <td>{{r.position}}</td>
                    <td>{{r.type}}</td>
                    <td>
                        <i class="bi bi-telephone-fill me-2"></i>
                        <i class="bi bi-envelope-fill"></i>
                    </td>
                    <td>
                        <span class="badge rounded-pill"
                            [ngClass]="{
                                'bg-warning text-dark': r.status === 'Pending',
                                'bg-danger': r.status === 'On Hold',
                                'bg-success': r.status === 'Candidate'
                            }">
                            {{ r.status }}
                        </span>
                    </td>
                    <td>
                        <i class="bi bi-three-dots-vertical text-muted"></i>
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>
